<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080b16" />
    <title>404 · Ethan-a2</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="not-found-page">
    <div class="noise" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>

    <main class="not-found">
      <section class="error-card large" aria-labelledby="not-found-title">
        <div class="window-bar">
          <span></span><span></span><span></span>
        </div>
        <p class="terminal-line">GET <span data-current-path>/unknown</span></p>
        <h1 class="terminal-code" id="not-found-title">4<span>0</span>4</h1>
        <p class="terminal-title">PAGE NOT FOUND</p>
        <p class="terminal-text">
          你抵达了一片未定义区域。回到主入口，或继续前往博客和作品集。
        </p>
        <div class="hero-actions centered">
          <a class="button primary" href="/">返回首页</a>
          <a class="button ghost" href="/blog/">进入博客</a>
        </div>
      </section>
    </main>

    <script src="site.config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
